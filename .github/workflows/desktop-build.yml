name: desktop-build

# Builds the unsigned Kimi Desktop (Electron) installers for macOS, Windows and
# Linux. Each runner builds the matching-platform SEA backend first, then
# packages it into the Electron app with electron-builder. Manual trigger for
# now; v1 does not sign / notarize / auto-update.
on:
  workflow_dispatch:
    inputs:
      retention-days:
        description: 'Artifact retention in days'
        required: false
        type: number
        default: 5

permissions:
  contents: read

jobs:
  desktop:
    name: Desktop installer (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: darwin-arm64
          - os: macos-15-intel
            target: darwin-x64
          - os: windows-2025-vs2026
            target: win32-x64
          - os: ubuntu-24.04
            target: linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Kimi web assets
        # The SEA blob embeds apps/kimi-code/dist-web; build the web app and
        # stage its assets before producing the native executable.
        run: |
          pnpm --filter @moonshot-ai/kimi-web run build
          node apps/kimi-code/scripts/copy-web-assets.mjs

      - name: Build native executable (local profile, unsigned)
        run: pnpm --filter @moonshot-ai/kimi-code run build:native:sea

      - name: Build & package desktop app (unsigned)
        env:
          # Never let electron-builder try to discover a signing identity.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: pnpm --filter @moonshot-ai/kimi-desktop run dist

      - name: Upload installers
        uses: actions/upload-artifact@v7
        with:
          name: kimi-desktop-${{ matrix.target }}
          retention-days: ${{ inputs.retention-days }}
          path: |
            apps/kimi-desktop/dist-app/*.dmg
            apps/kimi-desktop/dist-app/*.zip
            apps/kimi-desktop/dist-app/*.exe
            apps/kimi-desktop/dist-app/*.AppImage
            apps/kimi-desktop/dist-app/*.deb
          if-no-files-found: ignore
