<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="64x64" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d1117" media="(prefers-color-scheme: dark)" />
    <!-- Apply persisted display prefs BEFORE the bundle loads: without this,
         users can get a theme/font flash before useKimiWebClient mirrors the
         data attributes. Mirrors loadThemeFromStorage and
         applyColorSchemeToDocument. -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('kimi-web.theme');
          document.documentElement.dataset.theme = theme === 'terminal' || theme === 'modern' || theme === 'kimi' ? theme : 'modern';
          var v = localStorage.getItem('kimi-web.color-scheme');
          if (v === 'light' || v === 'dark' || v === 'system') {
            document.documentElement.dataset.colorScheme = v;
          }
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
    <title>Kimi Code Web</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
