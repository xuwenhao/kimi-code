appId: ai.moonshot.kimi.desktop
productName: Kimi Desktop
copyright: Copyright © Moonshot AI

# v1 ships unsigned builds — installable and runnable for testing, but not
# notarized / code-signed (that is a v2 concern).
directories:
  output: dist-app

# We have no native node modules in the Electron app itself; the backend is the
# prebuilt SEA staged by before-pack.cjs. Skip the rebuild step entirely.
npmRebuild: false
asar: true

# Only the built main process + manifest go into the asar.
files:
  - out/**
  - package.json

# before-pack stages the matching-platform SEA into resources-stage/bin/<target>;
# extraResources then copies it to <resources>/bin/<target>, which sea-path.ts
# resolves at runtime.
beforePack: ./scripts/before-pack.cjs
extraResources:
  - from: resources-stage/bin
    to: bin

mac:
  category: public.app-category.developer-tools
  identity: null
  target:
    - dmg
    - zip
  artifactName: ${productName}-${version}-${arch}.${ext}

win:
  target:
    - nsis
  artifactName: ${productName}-${version}-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  category: Development
  target:
    - AppImage
    - deb
  artifactName: ${productName}-${version}-${arch}.${ext}
